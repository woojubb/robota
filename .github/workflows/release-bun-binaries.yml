name: Release — Bun binaries

# DIST-002 — build the five Bun single-file `robota` binaries (DIST-001) and publish them to the tag's
# GitHub Release. Sibling to release.yml (manual npm publish); this workflow NEVER touches npm publishing.
# Binaries are UNSIGNED (Bun --compile cross-compilation) — macOS Gatekeeper / Windows SmartScreen will warn.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build + attach binaries to (e.g. v3.0.0-beta.79). The tag must already exist.'
        required: true
        type: string

permissions:
  contents: write

# Shares the Release with release-desktop-app.yml (both fire on v*) — same group so they serialize on release
# creation and never race on `gh release create`.
concurrency:
  group: release-assets-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  bun-binaries:
    name: Build + publish Bun binaries
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # agent-cli is bundled by tsdown, which resolves @robota-sdk/* to each dep's built dist/node/*.
      # The full workspace build must run before the Bun compile — a bare --filter agent-cli build would
      # fail on a clean checkout (this mirrors why release.yml runs `pnpm build` before publishing).
      - name: Build workspace
        run: pnpm build

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Compile Bun binaries (all 5 targets)
        run: pnpm --filter @robota-sdk/agent-cli build:bun:all

      - name: Sanity — host binary prints the real version (no Node)
        run: ./packages/agent-cli/dist/bin/robota-linux-x64 --version

      - name: Generate SHA-256 checksums
        working-directory: packages/agent-cli/dist/bin
        run: sha256sum robota-* > SHA256SUMS.txt

      # REL-022 — managed release notes: categorized conventional-commit notes instead of the raw
      # `--generate-notes` PR-title dump. The script auto-detects the previous v* tag (checkout above
      # uses fetch-depth: 0, so full tag history is available). No network — git history only.
      - name: Generate release notes
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: node scripts/release/generate-release-notes.mjs --tag "$TAG" --notes-file "${{ runner.temp }}/release-notes.md"

      - name: Publish binaries to the GitHub Release
        working-directory: packages/agent-cli/dist/bin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          NOTES: ${{ runner.temp }}/release-notes.md
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes-file "$NOTES"
          gh release upload "$TAG" \
            robota-darwin-arm64 \
            robota-darwin-x64 \
            robota-linux-x64 \
            robota-linux-arm64 \
            robota-windows-x64.exe \
            SHA256SUMS.txt \
            --clobber
