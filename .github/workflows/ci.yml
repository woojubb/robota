name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=50

      - name: Show verification plan
        run: pnpm harness:plan -- --base-ref origin/${{ github.base_ref }} --report-file .agents/evals/local-metrics/ci-plan.json

      - name: Upload verification plan
        uses: actions/upload-artifact@v4
        with:
          name: verification-plan
          path: .agents/evals/local-metrics/ci-plan.json
          if-no-files-found: error
          retention-days: 7

      - name: Build affected scopes
        run: pnpm harness:verify -- --base-ref origin/${{ github.base_ref }} --skip-tests --skip-lint --skip-typecheck --skip-record-check --skip-repository-checks

  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=50

      - name: Verify affected quality checks
        run: pnpm harness:verify -- --base-ref origin/${{ github.base_ref }} --skip-build --skip-record-check

  security-audit:
    name: security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=50

      - name: Run audit only for dependency graph changes
        run: |
          changed_files="$(git diff --name-only --diff-filter=ACMRD origin/${{ github.base_ref }}...HEAD)"
          if printf '%s\n' "$changed_files" | grep -Eq '(^pnpm-lock.yaml$|(^|/)package.json$)'; then
            pnpm audit --audit-level high
          else
            echo "No package manifest or lockfile changes; skipping pnpm audit."
          fi

  release-grade-verify:
    name: release-grade verification
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release-grade verification
        run: pnpm harness:verify:release

      - name: Security audit
        run: pnpm audit --audit-level high

  compat-node18:
    name: compat-node18
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build:deps

      - name: Test with coverage (excludes packages requiring Node 20+)
        run: pnpm --filter !@robota-sdk/agent-cli run test -- --coverage --coverage.thresholds.lines=80
