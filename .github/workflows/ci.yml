name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  # Recurrence guard for the #1216 incident: a feature branch was PR'd straight to `main`, skipping `develop`,
  # which swept the whole develop delta onto main and diverged the branches. The feature→develop→main flow is
  # fixed (git-branch.md); this makes it MECHANICAL — a PR to `main` must come from `develop` (or a
  # `release/*` / `hotfix/*` promotion branch), never a feature branch.
  main-pr-source-guard:
    name: main PR source guard
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Only develop / release / hotfix may target main
        run: |
          head="${{ github.head_ref }}"
          case "$head" in
            develop|release/*|hotfix/*)
              echo "OK: '$head' → main (allowed promotion source)" ;;
            *)
              echo "::error::A PR to 'main' must come from 'develop' (or a release/* / hotfix/* promotion branch), not '$head'. Feature work flows feature→develop→main — never feature→main. See .agents/rules/git-branch.md (#1216 incident)."
              exit 1 ;;
          esac

  # Proportional CI (DX): classify whether a PR touches CODE or is documentation-only, so a docs/harness-markdown
  # PR skips the heavy build/test/e2e matrix. Those gated jobs are NOT required status checks (required =
  # build/quality/scans/security-audit/commitlint, which always run), so skipping them is safe for branch
  # protection — a skipped non-required job does not block the merge.
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 50
      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=50
      - id: filter
        name: Classify changed paths (code vs docs-only)
        run: |
          files="$(git diff --name-only --diff-filter=ACMRD origin/${{ github.base_ref }}...HEAD)"
          echo "changed files:"; printf '%s\n' "$files"
          # 'code' = ANY changed file that is not pure documentation (markdown / docs site / versioned content).
          # A .agents/**/*.md harness-content PR is docs-only; a scripts/**, packages/**, .github/** change is code.
          if printf '%s\n' "$files" | grep -qvE '(\.mdx?$|^docs/|^content/)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "→ code changes present: full matrix runs."
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "→ docs-only PR: heavy build/test/e2e jobs are skipped."
          fi

  build:
    name: build
    runs-on: ubuntu-latest
    outputs:
      package_dist_required: ${{ steps.build_requirement.outputs.required }}

    steps:
      - name: Skip duplicate build for main PR
        if: github.base_ref == 'main'
        run: echo "build is covered by release-grade verification"

      - uses: actions/checkout@v7
        if: github.base_ref != 'main'
        with:
          fetch-depth: 50

      - name: Install pnpm
        if: github.base_ref != 'main'
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        if: github.base_ref != 'main'
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        if: github.base_ref != 'main'
        run: pnpm install --frozen-lockfile

      - name: Fetch base branch
        if: github.base_ref != 'main'
        run: git fetch origin ${{ github.base_ref }} --depth=50

      - name: Show verification plan
        if: github.base_ref != 'main'
        run: pnpm harness:plan -- --base-ref origin/${{ github.base_ref }} --report-file .agents/evals/local-metrics/ci-plan.json

      - name: Upload verification plan
        if: github.base_ref != 'main'
        uses: actions/upload-artifact@v4
        with:
          name: verification-plan
          path: .agents/evals/local-metrics/ci-plan.json
          if-no-files-found: error
          retention-days: 7

      - name: Detect build requirement
        id: build_requirement
        if: github.base_ref != 'main'
        run: |
          node --input-type=module <<'EOF'
          import { appendFileSync, readFileSync } from 'node:fs';

          const plan = JSON.parse(readFileSync('.agents/evals/local-metrics/ci-plan.json', 'utf8'));
          const checksRequiringPackageDist = new Set(['build', 'test', 'typecheck']);
          const required = plan.scopes.some((scope) =>
            scope.checks.some((check) => checksRequiringPackageDist.has(check)),
          );
          appendFileSync(process.env.GITHUB_OUTPUT, `required=${required ? 'true' : 'false'}\n`);

          if (required) {
            console.log('Package or app verification requires the root monorepo build output.');
          } else {
            console.log('No package or app verification requires build output.');
          }
          EOF

      - name: Build monorepo
        if: github.base_ref != 'main' && steps.build_requirement.outputs.required == 'true'
        run: pnpm build

      - name: Archive package build output
        if: github.base_ref != 'main' && steps.build_requirement.outputs.required == 'true'
        run: tar -czf package-dist.tgz packages/*/dist packages/dag-nodes/*/dist

      - name: Upload package build output
        if: github.base_ref != 'main' && steps.build_requirement.outputs.required == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: package-dist.tgz
          if-no-files-found: error
          retention-days: 1

      - name: Skip monorepo build when no build output is required
        if: github.base_ref != 'main' && steps.build_requirement.outputs.required != 'true'
        run: echo "No package or app verification requires build output."

  quality:
    name: quality
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Skip duplicate quality checks for main PR
        if: github.base_ref == 'main'
        run: echo "quality is covered by release-grade verification"

      - uses: actions/checkout@v7
        if: github.base_ref != 'main'
        with:
          fetch-depth: 50

      - name: Install pnpm
        if: github.base_ref != 'main'
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        if: github.base_ref != 'main'
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        if: github.base_ref != 'main'
        run: pnpm install --frozen-lockfile

      - name: Fetch base branch
        if: github.base_ref != 'main'
        run: git fetch origin ${{ github.base_ref }} --depth=50

      - name: Download package build output
        if: github.base_ref != 'main' && needs.build.outputs.package_dist_required == 'true'
        uses: actions/download-artifact@v4
        with:
          name: package-dist
          path: .artifacts/package-dist

      - name: Restore package build output
        if: github.base_ref != 'main' && needs.build.outputs.package_dist_required == 'true'
        run: tar -xzf .artifacts/package-dist/package-dist.tgz

      - name: Verify affected quality checks
        if: github.base_ref != 'main'
        run: pnpm harness:verify -- --base-ref origin/${{ github.base_ref }} --skip-build --skip-record-check

      # INFRA-037: build-contracts is the ONE scan that reads packages/*/dist (validates that declared
      # main/types/exports paths resolve to built files) and silently no-ops without dist. It stays in
      # `quality` (which restores dist above) so its coverage is preserved; the other 47 scans + the
      # harness test suite moved to the `needs`-less `scans` job (parallel with build). The full scan
      # suite remains a develop-merge gate (INFRA-026) — split across `scans` + this step, both required.
      - name: Build-output contracts scan (dist-dependent)
        if: github.base_ref != 'main'
        run: pnpm harness:scan:build-contracts

      # RUNTIME-001: build-gated black-box e2e for the real `robota --serve` binary (+ the cross-fidelity
      # bintest). These spawn the built CLI, so they need packages/*/dist (restored above) — hence they run
      # here rather than in the dist-independent `scans` job. Deterministic (replay provider over loopback
      # WS; no model key, no network). Gated on dist actually being restored so unrelated PRs skip cleanly.
      - name: Binary e2e (agent-cli bintests, dist-dependent)
        if: github.base_ref != 'main' && needs.build.outputs.package_dist_required == 'true'
        run: pnpm --filter @robota-sdk/agent-cli test:bin

  # INFRA-037: the dist-INDEPENDENT scan suite + harness unit tests run here with NO `needs: build`, so
  # they start immediately and run in parallel with `build` (removing the ~3-min build-wait for work that
  # never consumed dist). Shaped like build/quality (main-base no-op + step-level `if`) so this REQUIRED
  # check always resolves and never lingers pending.
  scans:
    name: scans
    runs-on: ubuntu-latest

    steps:
      - name: Skip duplicate scans for main PR
        if: github.base_ref == 'main'
        run: echo "scans are covered by release-grade verification"

      - uses: actions/checkout@v7
        if: github.base_ref != 'main'
        with:
          fetch-depth: 50

      - name: Install pnpm
        if: github.base_ref != 'main'
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        if: github.base_ref != 'main'
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        if: github.base_ref != 'main'
        run: pnpm install --frozen-lockfile

      # HARNESS-021: the harness scans' own unit suite runs in full — per-scan test selection
      # (verify-change) cannot see suite-wide drift, which let 5 stale fixtures sit silent.
      - name: Harness scan test suite
        if: github.base_ref != 'main'
        run: pnpm harness:test

      # INFRA-026: the full scan suite is a develop-merge gate, not a release-only one.
      # `dist` is a LOCAL pre-CI freshness check (a fresh checkout has no dist to measure — skip printed,
      # never silent); `build-contracts` (INFRA-037) is dist-dependent and runs in the `quality` job after
      # dist restore, so it is skipped here rather than silently no-op'ing on a source/build-change PR.
      - name: Harness scan suite (dist-independent)
        if: github.base_ref != 'main'
        run: pnpm harness:scan -- --skip dist --skip build-contracts

  security-audit:
    name: security audit
    runs-on: ubuntu-latest

    steps:
      - name: Skip duplicate audit for main PR
        if: github.base_ref == 'main'
        run: echo "security audit is covered by release-grade verification"

      - uses: actions/checkout@v7
        if: github.base_ref != 'main'
        with:
          fetch-depth: 50

      - name: Fetch base branch
        if: github.base_ref != 'main'
        run: git fetch origin ${{ github.base_ref }} --depth=50

      - name: Detect dependency graph changes
        id: dependency_changes
        if: github.base_ref != 'main'
        run: |
          changed_files="$(git diff --name-only --diff-filter=ACMRD origin/${{ github.base_ref }}...HEAD)"
          if printf '%s\n' "$changed_files" | grep -Eq '(^pnpm-lock.yaml$|(^|/)package.json$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No package manifest or lockfile changes; skipping vulnerability scan."
          fi

      # INFRA-038: npm retired the legacy audit endpoint (pnpm audit → 410). osv-scanner reads the pnpm lockfile
      # directly (OSV.dev DB) — no pnpm/node install needed; it fails on any un-ignored vuln; re-accepts live in
      # osv-scanner.toml (single SSOT).
      - name: Vulnerability scan (osv-scanner) for dependency graph changes
        if: github.base_ref != 'main' && steps.dependency_changes.outputs.changed == 'true'
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/download/v2.0.2/osv-scanner_linux_amd64 -o "$RUNNER_TEMP/osv-scanner"
          chmod +x "$RUNNER_TEMP/osv-scanner"
          "$RUNNER_TEMP/osv-scanner" scan source --config osv-scanner.toml --lockfile pnpm-lock.yaml

  release-grade-verify:
    name: release-grade verification
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 50

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release-grade verification
        run: pnpm harness:verify:release

      # INFRA-038: osv-scanner (pnpm-lockfile-based) — the retired npm audit endpoint broke `pnpm audit`.
      - name: Vulnerability scan (osv-scanner)
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/download/v2.0.2/osv-scanner_linux_amd64 -o "$RUNNER_TEMP/osv-scanner"
          chmod +x "$RUNNER_TEMP/osv-scanner"
          "$RUNNER_TEMP/osv-scanner" scan source --config osv-scanner.toml --lockfile pnpm-lock.yaml

  # HARNESS-DIET-007: this job verifies the declared Node >=18 engines floor, so it
  # must actually run on Node 18 (it previously ran on 22.x and tested nothing extra).
  compat-node18:
    name: compat-node18
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 50

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build:deps

      - name: Test with coverage (excludes packages requiring Node 20+)
        # robota-web (apps/agent-web) is a jest-based Next.js app, not a published
        # Node-18 consumer surface; jest cannot parse the vitest coverage flags.
        run: pnpm --filter !@robota-sdk/agent-cli --filter !robota-web run test -- --coverage --coverage.thresholds.lines=80

  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    if: github.base_ref != 'main'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=50

      - name: Lint PR commit messages
        run: pnpm exec commitlint --from origin/${{ github.base_ref }} --to HEAD --verbose

  examples-typecheck:
    name: examples-typecheck
    runs-on: ubuntu-latest
    needs: changes
    if: github.base_ref != 'main' && needs.changes.outputs.code == 'true'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 50

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (so examples typecheck against local source)
        run: pnpm build:deps

      - name: Typecheck examples
        run: pnpm examples:typecheck

  # TERM-007 item 2 / TERM-008: verify cross-platform shell execution on real Windows.
  # The resolver + Shell tool spawn PowerShell here, so these tests exercise the win32 path
  # that the macOS/Linux jobs (and mocked-platform unit tests) cannot. Blocking: first run
  # passed green on windows-latest (PR #900, 1m34s), so Windows shell execution is now a
  # maintained, every-PR gate rather than a one-off pass.
  windows-shell:
    name: windows-shell
    runs-on: windows-latest
    needs: changes
    if: github.base_ref != 'main' && needs.changes.outputs.code == 'true'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 50

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build agent-core + agent-process for dependent tests
        # CORE-023: shell-tool now imports @robota-sdk/agent-process (killProcessTree); this
        # minimal job resolves workspace deps from built dist, so agent-process must be built too.
        run: pnpm --filter @robota-sdk/agent-core --filter @robota-sdk/agent-process build

      - name: Verify the cross-platform shell resolver on Windows
        run: pnpm --filter @robota-sdk/agent-core test -- --run platform-shell

      - name: Verify the Shell tool actually spawns PowerShell on Windows
        run: pnpm --filter @robota-sdk/agent-tools test -- --run shell-tool

  # TEST-010: run the TUI PTY E2E suite (`*.ptytest.ts`) against the BUILT robota binary on every PR,
  # so the live-TUI behaviours — the SCREEN-013 Ctrl+B drill-in entry point and the existing
  # flag/scrollback/handoff PTY checks — are maintained, not bit-rotting outside CI.
  tui-e2e:
    name: tui-e2e
    runs-on: ubuntu-latest
    needs: changes
    if: github.base_ref != 'main' && needs.changes.outputs.code == 'true'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 50

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (provides the built robota binary the PTY suite drives)
        run: pnpm build:deps

      - name: Run the TUI PTY E2E suite against the real binary
        run: pnpm --filter @robota-sdk/agent-transport-tui test:pty

  # HARNESS-041: mechanical floor for accidental-green regression tests. For a `fix:` PR with a
  # same-package (source+test) pair, it reverse-applies the source hunks and requires the changed test
  # to FAIL — proving the regression test actually exercises the fix. ADVISORY in v1 (not a required
  # check): the job runs and prints the verdict but never blocks the merge (the script exits 0 unless
  # REGRESSION_RED_PROOF_ENFORCE=1). Flip to required once it has proven stable across real PRs.
  regression-red-proof:
    name: regression-red-proof (advisory)
    runs-on: ubuntu-latest
    needs: changes
    if: github.base_ref != 'main' && needs.changes.outputs.code == 'true'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 50

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch the base branch (for merge-base + reverse-diff)
        run: git fetch origin ${{ github.base_ref }} --depth=50

      - name: Prove regression tests are RED without the fix
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/harness/check-regression-red-proof.mjs
