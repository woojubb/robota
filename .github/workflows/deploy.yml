name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - staging
          - production
        default: 'staging'

# Manual-only deployment. Run from GitHub Actions UI.

jobs:
  test:
    name: Test and Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package workspace
        run: pnpm build

      - name: Archive package build output
        run: tar -czf package-dist.tgz packages/*/dist packages/dag-nodes/*/dist

      - name: Upload package build output
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: package-dist.tgz
          if-no-files-found: error
          retention-days: 1

      - name: Run linting
        run: pnpm --filter @robota-sdk/agent-web run lint

      - name: Run tests
        run: pnpm --filter @robota-sdk/agent-web run test:ci
      # The codecov upload step was removed (Dependabot #1309 triage): no CODECOV_TOKEN secret, no
      # codecov.yml, silent-fail config — the upload never worked. Re-add deliberately with a token
      # if coverage reporting is ever wanted.

  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test

    environment:
      name: ${{ github.event.inputs.environment }}
      url: ${{ github.event.inputs.environment == 'production' && 'https://robota.io' || 'https://staging.robota.io' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download package build output
        uses: actions/download-artifact@v8
        with:
          name: package-dist
          path: .artifacts/package-dist

      - name: Restore package build output
        run: tar -xzf .artifacts/package-dist/package-dist.tgz

      - name: Build application
        run: pnpm --filter @robota-sdk/agent-web run build
        env:
          NEXT_PUBLIC_APP_ENV: ${{ github.event.inputs.environment }}
          NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}

      - name: Deploy to Vercel (Production)
        if: github.event.inputs.environment == 'production'
        uses: vercel/action@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: apps/agent-web

      - name: Deploy to Vercel (Staging)
        if: github.event.inputs.environment == 'staging'
        uses: vercel/action@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
          working-directory: apps/agent-web
