services:
  comfyui:
    build:
      context: .
      dockerfile: docker/dag-comfyui/Dockerfile
      args:
        COMFYUI_REF: ${COMFYUI_REF:-v0.19.3}
        PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    ports:
      - '${COMFYUI_PORT:-8188}:8188'
    volumes:
      - dag-comfyui-models:/opt/comfyui/models
      - dag-comfyui-input:/opt/comfyui/input
      - dag-comfyui-output:/opt/comfyui/output
      - dag-comfyui-user:/opt/comfyui/user
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8188/object_info', timeout=5).read(1)"
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  dag-comfyui-models:
  dag-comfyui-input:
  dag-comfyui-output:
  dag-comfyui-user:
